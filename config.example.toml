template_image = "./template.png"
output_dir = "./output"
log_file = "./frantic-postr.log"

[plex]
base_url = "http://127.0.0.1:32400"
token = "YOUR_PLEX_TOKEN"
retries = 3

[[label.lookup]]
title_contains = "abandoned"
labels = ["urbsex", "abandoned"]
categories = ["urbsex", "abandoned"]
update_category = true

[[label.lookup]]
title_contains = "fisting"
labels = ["fisting"]
categories = ["fisting"]
update_category = true

[[label.lookup]]
title_contains_any = ["Chem", "PnP"]
labels = ["Chems"]
categories = ["Chems"]
update_category = true

[clean.replacements]
"&" = " and "
"£" = " gbp "
"$" = " usd "
"FULL MOVIE" = " "

[clean]
translate_api_http_address = "https://libretranslate.com/translate"
translate_endpoint = "https://libretranslate.com/translate"
translate_api_key = ""
translate_rate_limit_per_minute = 10

[font]
file = ""
size = 64
color = "#FFFFFF"
shadow_color = "#000000"
shadow_offset_x = 2
shadow_offset_y = 2
glow_color = "#000000"
glow_radius = 3
glow_alpha = 0.35
y_offset = 0
